<!DOCTYPE html>
<html lang="en">

<head>
    <title>AQUA - Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-slate-950 text-slate-100 flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <p class="text-xs font-semibold tracking-widest text-cyan-400 uppercase mb-1">AQUA</p>
            <h1 class="text-2xl font-bold text-white">Create an Account</h1>
            <p class="text-slate-400 text-sm mt-1">Join to start taking quizzes</p>
        </div>

        {% if error %}
        <div class="mb-4 px-4 py-3 bg-red-950 border border-red-700 rounded-xl text-red-300 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/register"
            class="bg-slate-900 border border-slate-800 rounded-2xl shadow-xl p-8 space-y-5">

            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                <input id="username" name="username" type="text" required
                    placeholder="e.g. adarsh"
                    class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-slate-100
                           placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-1
                           focus:ring-cyan-500 transition-colors duration-150">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
                <input id="email" name="email" type="email" required
                    placeholder="you@example.com"
                    class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-slate-100
                           placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-1
                           focus:ring-cyan-500 transition-colors duration-150">
            </div>

            <button type="submit"
                class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-semibold text-white
                       transition-colors duration-200 mt-2">
                Register
            </button>

        </form>

        <p class="text-center text-slate-500 text-sm mt-4">
            Already have an account?
            <a href="/" class="text-cyan-400 hover:text-cyan-300 transition-colors">Go home</a>
        </p>

    </div>

</body>

</html>
