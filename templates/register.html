{% extends "base.html" %}
{% block title %}AQUA — Create Account{% endblock %}

{% block body %}
<div class="min-h-screen flex flex-col items-center justify-center px-4 py-12">
    <div class="w-full max-w-md fade-up">

        <div class="text-center mb-8">
            <a href="/" class="inline-block text-xs font-bold tracking-widest text-cyan-400 uppercase mb-5 hover:text-cyan-300 transition-colors">← AQUA</a>
            <h1 class="text-2xl font-bold text-white">Create an Account</h1>
            <p class="text-slate-400 text-sm mt-2">Join to start generating and playing quizzes</p>
        </div>

        {% if error %}
        <div class="mb-5 px-4 py-3 rounded-xl bg-red-950/60 border border-red-800/60 text-red-300 text-sm flex items-start gap-2.5">
            <span class="mt-0.5 shrink-0 text-red-400">⚠</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/register" class="card rounded-2xl shadow-2xl p-8 space-y-5">

            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                <input id="username" name="username" type="text" required autocomplete="username"
                    placeholder="e.g. adarsh"
                    class="inp px-4 py-2.5 rounded-xl text-sm">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-2">Email address</label>
                <input id="email" name="email" type="email" required autocomplete="email"
                    placeholder="you@example.com"
                    class="inp px-4 py-2.5 rounded-xl text-sm">
            </div>

            <button type="submit" class="btn-primary w-full py-3 rounded-2xl font-semibold text-white text-sm mt-1">
                Create Account
            </button>

        </form>

        <p class="text-center text-slate-500 text-sm mt-5">
            Already have an account?
            <a href="/login" class="text-cyan-400 hover:text-cyan-300 transition-colors font-medium">Sign in</a>
        </p>

    </div>
</div>
{% endblock %}
