<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AQUA{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            background-color: #020817;
            background-image:
                radial-gradient(ellipse 70% 45% at 50% -5%, rgba(6,182,212,.11) 0%, transparent 65%),
                radial-gradient(circle at 1px 1px, rgba(148,163,184,.055) 1px, transparent 0);
            background-size: 100%, 28px 28px;
        }
        .g-text {
            background: linear-gradient(128deg, #22d3ee 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card {
            background: rgba(15,23,42,.78);
            border: 1px solid rgba(51,65,85,.65);
            backdrop-filter: blur(16px);
        }
        .btn-primary {
            background: linear-gradient(128deg, #0891b2, #7c3aed);
            transition: all .22s;
            display: block;
            text-align: center;
        }
        .btn-primary:hover {
            background: linear-gradient(128deg, #0e7490, #6d28d9);
            box-shadow: 0 4px 24px rgba(6,182,212,.28);
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: rgba(30,41,59,.55);
            border: 1px solid rgba(51,65,85,.75);
            transition: all .18s;
            display: block;
            text-align: center;
        }
        .btn-ghost:hover {
            background: rgba(30,41,59,.9);
            border-color: rgba(71,85,105,.9);
        }
        .inp {
            background: rgba(15,23,42,.65);
            border: 1px solid rgba(51,65,85,.8);
            color: #f1f5f9;
            transition: border-color .15s, box-shadow .15s;
            width: 100%;
        }
        .inp::placeholder { color: #475569; }
        .inp:focus { outline: none; border-color: #22d3ee; box-shadow: 0 0 0 3px rgba(34,211,238,.13); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp .32s ease both; }
        .d1 { animation-delay: .06s; }
        .d2 { animation-delay: .12s; }
        .d3 { animation-delay: .18s; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen text-slate-100 antialiased">
{% block body %}{% endblock %}
</body>
</html>
