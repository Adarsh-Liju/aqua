{% extends "base.html" %}
{% block title %}AQUA — Set Up Players{% endblock %}

{% block body %}
<div class="min-h-screen flex flex-col items-center justify-center px-4 py-12">
    <div class="w-full max-w-md fade-up">

        <div class="text-center mb-8">
            <a href="/" class="inline-block text-xs font-bold tracking-widest text-cyan-400 uppercase mb-5 hover:text-cyan-300 transition-colors">AQUA</a>
            <h1 class="text-2xl font-bold text-white">Set Up Players</h1>
            <p class="text-slate-400 text-sm mt-2">
                Welcome, <span class="text-slate-200 font-semibold">{{ user.username }}</span> — add 2 to 8 players
            </p>
        </div>

        {% if error %}
        <div class="mb-5 px-4 py-3 rounded-xl bg-red-950/60 border border-red-800/60 text-red-300 text-sm flex items-start gap-2.5">
            <span class="mt-0.5 shrink-0 text-red-400">⚠</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/players/setup" class="card rounded-2xl shadow-2xl p-8">

            <div id="players-container" class="space-y-2.5 mb-5">
                <div class="player-row flex items-center gap-3">
                    <span class="w-7 h-7 rounded-full bg-cyan-950 border border-cyan-800/70 text-cyan-400 text-xs font-bold flex items-center justify-center shrink-0">1</span>
                    <input name="player_name" type="text" required maxlength="32" placeholder="Player 1"
                        class="inp px-4 py-2.5 rounded-xl text-sm flex-1">
                </div>
                <div class="player-row flex items-center gap-3">
                    <span class="w-7 h-7 rounded-full bg-cyan-950 border border-cyan-800/70 text-cyan-400 text-xs font-bold flex items-center justify-center shrink-0">2</span>
                    <input name="player_name" type="text" required maxlength="32" placeholder="Player 2"
                        class="inp px-4 py-2.5 rounded-xl text-sm flex-1">
                </div>
            </div>

            <div class="flex gap-2 mb-6">
                <button type="button" id="add-btn" onclick="addPlayer()"
                    class="btn-ghost flex-1 py-2 rounded-xl text-sm font-medium text-slate-300">
                    + Add Player
                </button>
                <button type="button" id="remove-btn" onclick="removePlayer()" disabled
                    class="btn-ghost flex-1 py-2 rounded-xl text-sm font-medium text-slate-500 disabled:opacity-40 disabled:cursor-not-allowed">
                    − Remove
                </button>
            </div>

            <button type="submit" class="btn-primary w-full py-3 rounded-2xl font-semibold text-white text-sm">
                Start Game
            </button>

        </form>
    </div>
</div>

<script>
    const MIN = 2, MAX = 8;
    let count = 2;
    const container = document.getElementById('players-container');
    const addBtn    = document.getElementById('add-btn');
    const removeBtn = document.getElementById('remove-btn');

    function updateButtons() {
        addBtn.disabled    = count >= MAX;
        removeBtn.disabled = count <= MIN;
    }

    function addPlayer() {
        if (count >= MAX) return;
        count++;
        const row = document.createElement('div');
        row.className = 'player-row flex items-center gap-3 fade-up';
        row.innerHTML = `
            <span class="w-7 h-7 rounded-full bg-cyan-950 border border-cyan-800/70 text-cyan-400 text-xs font-bold flex items-center justify-center shrink-0">${count}</span>
            <input name="player_name" type="text" maxlength="32" placeholder="Player ${count}"
                class="inp px-4 py-2.5 rounded-xl text-sm flex-1">
        `;
        container.appendChild(row);
        row.querySelector('input').focus();
        updateButtons();
    }

    function removePlayer() {
        if (count <= MIN) return;
        container.lastElementChild.remove();
        count--;
        updateButtons();
    }
</script>
{% endblock %}
